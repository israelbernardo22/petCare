<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card border-0 shadow-lg p-4 login-card">
    <div class="text-center mb-4">
      <h1 class="fw-bold text-primary mb-1">🐾 PetCare</h1>
      <p class="text-muted">Bem-vindo (a) de volta! Entre na sua conta.</p>
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger border-0 small py-2 mb-3">
        {{ errorMessage }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-semibold small">E-mail</label>
        <input type="email" formControlName="email" class="form-control rounded-pill" 
               placeholder="seu@email.com" [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold small">Senha</label>
        <input type="password" formControlName="password" class="form-control rounded-pill" 
               placeholder="••••••••" [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading" 
        class="btn btn-primary w-100 rounded-pill py-2 fw-bold shadow-sm">

  <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
  {{ loading ? 'Entrando...' : 'Entrar' }}

</button>
    </form>

    <div class="text-center mt-4">
      <p class="small text-muted">Ainda não tem uma conta? 
        <a routerLink="/register" class="text-primary fw-bold text-decoration-none">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
