<app-navbar></app-navbar>

<div class="rc-page">
  <div class="rc-content">

    <div class="rc-header">
      <button class="rc-back" (click)="goBack()">← Voltar</button>
      <h2 class="rc-title">Registrar cuidado</h2>
    </div>

    @if (success()) {
      <div class="rc-success">
        ✅ Registro salvo com sucesso! Redirecionando...
      </div>
    }

    @if (errorMsg()) {
      <div class="rc-error">{{ errorMsg() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="rc-section">
        <p class="rc-section-label">Informações básicas</p>
        <div class="rc-grid-2">
          <div class="rc-field">
            <label class="rc-label">Tipo de cuidado *</label>
            <select formControlName="type" class="rc-input">
              <option value="">Selecione...</option>
              @for (t of careTypes; track t.value) {
                <option [value]="t.value">{{ t.label }}</option>
              }
            </select>
          </div>
          <div class="rc-field">
            <label class="rc-label">Título *</label>
            <input formControlName="title" class="rc-input" placeholder="Ex: Vacina V10 anual" />
          </div>
        </div>

        <div class="rc-field">
          <label class="rc-label">Descrição</label>
          <textarea formControlName="description" class="rc-input rc-textarea" placeholder="Detalhes do cuidado..."></textarea>
        </div>

        <div class="rc-grid-2">
          <div class="rc-field">
            <label class="rc-label">Data realizada *</label>
            <input formControlName="performedAt" type="date" class="rc-input" />
          </div>
          <div class="rc-field">
            <label class="rc-label">Próxima data</label>
            <input formControlName="nextDueAt" type="date" class="rc-input" />
          </div>
        </div>
      </div>

      <div class="rc-section">
        <p class="rc-section-label">Clínica e veterinário</p>
        <div class="rc-grid-2">
          <div class="rc-field">
            <label class="rc-label">Veterinário</label>
            <input formControlName="veterinarian" class="rc-input" placeholder="Nome do veterinário" />
          </div>
          <div class="rc-field">
            <label class="rc-label">Clínica</label>
            <input formControlName="clinic" class="rc-input" placeholder="Nome da clínica" />
          </div>
        </div>
        <div class="rc-field">
          <label class="rc-label">Custo (R$)</label>
          <input formControlName="cost" type="number" class="rc-input" placeholder="0.00" />
        </div>
      </div>

      <div class="rc-section">
        <p class="rc-section-label">Medicação (opcional)</p>
        <div class="rc-grid-2">
          <div class="rc-field">
            <label class="rc-label">Dosagem</label>
            <input formControlName="dosage" class="rc-input" placeholder="Ex: 10mg" />
          </div>
          <div class="rc-field">
            <label class="rc-label">Número do lote</label>
            <input formControlName="batchNumber" class="rc-input" placeholder="Ex: LOTE-2024-X1" />
          </div>
        </div>
      </div>

      <button type="submit" class="rc-btn" [disabled]="form.invalid || isLoading()">
        @if (isLoading()) { Salvando... } @else { Salvar registro }
      </button>

    </form>
  </div>
</div>
